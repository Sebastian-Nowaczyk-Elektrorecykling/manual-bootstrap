apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: storage
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  project: default
  sources: 
    repoURL: https://github.com/longhorn/longhorn.git
    targetRevision: HEAD
    path: deploy/longhorn.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
