apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoUrl: https://github.com/argoproj/argo-cd.git
    targetRevision: master
    path: manifests/install.yaml
  destination:
      server: https://kubernetes.default.svc
      namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
